<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>نظام الحضور والانصراف</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --dark: #0d0d0d;
      --card-bg: rgba(10, 10, 10, 0.75);
      --success: #2ecc71;
      --danger: #e74c3c;
      --radius: 18px;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      overflow: hidden;
      position: relative;
    }

    /* ===== BACKGROUND ===== */
    #bg {
      position: fixed;
      inset: 0;
      background-image: url('YOUR_BACKGROUND_IMAGE.jpg'); /* ← ضع رابط صورتك هنا */
      background-size: cover;
      background-position: center;
      filter: brightness(0.45);
      z-index: 0;
    }

    /* ===== GLASS OVERLAY ===== */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 700px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
    }
    .header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 900;
      color: var(--gold-light);
      letter-spacing: 1px;
      text-shadow: 0 0 24px rgba(201,168,76,0.5);
    }
    .header p {
      color: rgba(255,255,255,0.55);
      font-size: 0.95rem;
      margin-top: 6px;
    }

    /* ===== CARDS ROW ===== */
    .cards {
      display: flex;
      gap: 20px;
      width: 100%;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      flex: 1 1 240px;
      max-width: 300px;
      background: var(--card-bg);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 36px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      transition: transform .28s, box-shadow .28s, border-color .28s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(201,168,76,0.12), transparent 70%);
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--gold);
      box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(201,168,76,0.2);
    }
    .card:active { transform: scale(0.97); }

    .card-icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.5));
    }
    .card-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold-light);
    }
    .card-sub {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      text-align: center;
      line-height: 1.5;
    }

    /* card colors */
    .card.checkin:hover  { box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(46,204,113,0.25); border-color: var(--success); }
    .card.checkout:hover { box-shadow: 0 16px 48px rgba(0,0,0,0.6), 0 0 30px rgba(231,76,60,0.25); border-color: var(--danger); }

    /* ===== STATUS BAR ===== */
    #status {
      width: 100%;
      max-width: 500px;
      padding: 14px 20px;
      border-radius: 50px;
      text-align: center;
      font-size: 0.92rem;
      font-weight: 700;
      display: none;
      animation: fadeIn .4s ease;
    }
    #status.info    { background: rgba(52,152,219,0.25); color: #74b9ff; border: 1px solid rgba(52,152,219,0.4); display:block; }
    #status.success { background: rgba(46,204,113,0.2);  color: #55efc4; border: 1px solid rgba(46,204,113,0.4); display:block; }
    #status.error   { background: rgba(231,76,60,0.2);   color: #ff7675; border: 1px solid rgba(231,76,60,0.4); display:block; }

    /* ===== SPINNER ===== */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }

    /* ===== DISTANCE BADGE ===== */
    #distance-info {
      color: rgba(255,255,255,0.4);
      font-size: 0.78rem;
      text-align: center;
      min-height: 18px;
    }

    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes fadeIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    /* ===== SETTINGS PANEL (gear icon top-left) ===== */
    #gear-btn {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      border-radius: 50%;
      width: 42px; height: 42px;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    #gear-btn:hover { background: rgba(201,168,76,0.2); color: var(--gold-light); }

    #settings-panel {
      position: fixed;
      top: 70px; left: 18px;
      z-index: 20;
      background: rgba(10,10,10,0.9);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 14px;
      padding: 20px 18px;
      width: 310px;
      display: none;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(20px);
      animation: fadeIn .25s ease;
    }
    #settings-panel.open { display: flex; }
    #settings-panel h3 { color: var(--gold-light); font-size: 1rem; font-weight: 700; }
    #settings-panel label { color: rgba(255,255,255,0.6); font-size: 0.8rem; margin-bottom: 3px; display: block; }
    #settings-panel input, #settings-panel select {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.07);
      color: #fff; font-family: 'Tajawal',sans-serif; font-size: 0.85rem;
    }
    #settings-panel input:focus, #settings-panel select:focus {
      outline: none; border-color: var(--gold);
    }
    .save-btn {
      padding: 9px; border-radius: 8px; border: none;
      background: var(--gold); color: #000;
      font-family: 'Tajawal',sans-serif; font-weight: 700; font-size: 0.9rem;
      cursor: pointer; transition: opacity .2s;
    }
    .save-btn:hover { opacity: .85; }

    /* ===== CLOCK ===== */
    #clock {
      color: rgba(255,255,255,0.35);
      font-size: 0.85rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div id="bg"></div>

<!-- Settings gear -->
<button id="gear-btn" title="الإعدادات">⚙️</button>

<div id="settings-panel">
  <h3>⚙️ إعدادات الموقع والرابط</h3>

  <div>
    <label>خط عرض الموقع (Latitude)</label>
    <input type="number" id="set-lat" step="0.000001" placeholder="مثال: 24.774265"/>
  </div>
  <div>
    <label>خط طول الموقع (Longitude)</label>
    <input type="number" id="set-lng" step="0.000001" placeholder="مثال: 46.738586"/>
  </div>
  <div>
    <label>نطاق السماح بالدخول (بالمتر)</label>
    <input type="number" id="set-radius" value="100" min="10" max="2000"/>
  </div>
  <div>
    <label>رابط Google Form — تسجيل الحضور</label>
    <input type="url" id="set-checkin-url" placeholder="https://forms.gle/..."/>
  </div>
  <div>
    <label>رابط Google Form — تسجيل الانصراف</label>
    <input type="url" id="set-checkout-url" placeholder="https://forms.gle/..."/>
  </div>
  <button class="save-btn" onclick="saveSettings()">💾 حفظ الإعدادات</button>
</div>

<!-- Main content -->
<div class="wrapper">
  <div class="header">
    <h1>نظام الحضور والانصراف</h1>
    <p id="clock"></p>
  </div>

  <div class="cards">
    <div class="card checkin" onclick="handleAttendance('checkin')">
      <div class="card-icon">✅</div>
      <div class="card-title">تسجيل الحضور</div>
      <div class="card-sub">سيتم التحقق من موقعك<br/>قبل الانتقال للنموذج</div>
    </div>
    <div class="card checkout" onclick="handleAttendance('checkout')">
      <div class="card-icon">🚪</div>
      <div class="card-title">تسجيل الانصراف</div>
      <div class="card-sub">سيتم التحقق من موقعك<br/>قبل الانتقال للنموذج</div>
    </div>
  </div>

  <div id="status"></div>
  <div id="distance-info"></div>
</div>

<script>
  // ============================================================
  //  CONFIG — يمكنك تغييرها مباشرة هنا أو من خلال الإعدادات ⚙️
  // ============================================================
  const DEFAULT_CONFIG = {
    lat:        21.416411,      // خط العرض للموقع المسموح به
    lng:        39885621,      // خط الطول للموقع المسموح به
    radius:     1000,            // نطاق السماح بالمتر
    checkinUrl:  'https://forms.gle/ykv99FbvJip7Fhp99',   // رابط نموذج الحضور
    checkoutUrl: 'https://forms.gle/FsHitkRbXJizgbZJ8',  // رابط نموذج الانصراف
  };
  // ============================================================

  function loadConfig() {
    try { return { ...DEFAULT_CONFIG, ...JSON.parse(localStorage.getItem('att_config') || '{}') }; }
    catch { return { ...DEFAULT_CONFIG }; }
  }
  function saveSettings() {
    const cfg = loadConfig();
    const lat = parseFloat(document.getElementById('set-lat').value);
    const lng = parseFloat(document.getElementById('set-lng').value);
    const r   = parseInt(document.getElementById('set-radius').value);
    const ci  = document.getElementById('set-checkin-url').value.trim();
    const co  = document.getElementById('set-checkout-url').value.trim();
    if (!isNaN(lat)) cfg.lat = lat;
    if (!isNaN(lng)) cfg.lng = lng;
    if (!isNaN(r) && r > 0) cfg.radius = r;
    if (ci) cfg.checkinUrl = ci;
    if (co) cfg.checkoutUrl = co;
    localStorage.setItem('att_config', JSON.stringify(cfg));
    document.getElementById('settings-panel').classList.remove('open');
    setStatus('success', '✅ تم حفظ الإعدادات بنجاح');
  }

  // Gear toggle
  document.getElementById('gear-btn').onclick = () => {
    const p = document.getElementById('settings-panel');
    p.classList.toggle('open');
    if (p.classList.contains('open')) {
      const cfg = loadConfig();
      document.getElementById('set-lat').value = cfg.lat;
      document.getElementById('set-lng').value = cfg.lng;
      document.getElementById('set-radius').value = cfg.radius;
      document.getElementById('set-checkin-url').value = cfg.checkinUrl || '';
      document.getElementById('set-checkout-url').value = cfg.checkoutUrl || '';
    }
  };
  // Close panel on outside click
  document.addEventListener('click', e => {
    const p = document.getElementById('settings-panel');
    const g = document.getElementById('gear-btn');
    if (!p.contains(e.target) && e.target !== g) p.classList.remove('open');
  });

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleDateString('ar-SA', {weekday:'long', year:'numeric', month:'long', day:'numeric'}) +
      '  |  ' + now.toLocaleTimeString('ar-SA');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Haversine distance (meters)
  function getDistance(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function setStatus(type, msg) {
    const el = document.getElementById('status');
    el.className = type;
    el.innerHTML = msg;
  }

  function handleAttendance(type) {
    const cfg = loadConfig();
    setStatus('info', `<span class="spinner"></span> جارٍ تحديد موقعك…`);
    document.getElementById('distance-info').textContent = '';

    if (!navigator.geolocation) {
      setStatus('error', '❌ المتصفح لا يدعم خاصية تحديد الموقع');
      return;
    }

    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude, longitude, accuracy } = pos.coords;
        const dist = Math.round(getDistance(latitude, longitude, cfg.lat, cfg.lng));
        document.getElementById('distance-info').textContent =
          `📍 أنت على بُعد ${dist} متر من الموقع المحدد (دقة GPS: ±${Math.round(accuracy)} م)`;

        if (dist <= cfg.radius) {
          setStatus('success', `✅ تم تأكيد موقعك! جارٍ فتح النموذج…`);
          setTimeout(() => {
            const url = type === 'checkin' ? cfg.checkinUrl : cfg.checkoutUrl;
            window.open(url, '_blank');
            setStatus('success', type === 'checkin'
              ? '✅ تم فتح نموذج تسجيل الحضور'
              : '✅ تم فتح نموذج تسجيل الانصراف');
          }, 800);
        } else {
          setStatus('error', `❌ أنت خارج النطاق المسموح به (${cfg.radius} متر). المسافة الحالية: ${dist} متر`);
        }
      },
      err => {
        const msgs = {
          1: 'رفضت الإذن بالوصول للموقع. يرجى السماح من إعدادات المتصفح.',
          2: 'تعذّر تحديد الموقع. تأكد من تفعيل GPS.',
          3: 'انتهت مهلة تحديد الموقع. حاول مجدداً.',
        };
        setStatus('error', '❌ ' + (msgs[err.code] || 'خطأ غير متوقع'));
      },
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
    );
  }
</script>
</body>
</html>
